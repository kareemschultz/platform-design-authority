# Labels-as-code source of truth for this repository.
#
# scripts/sync_labels.py reconciles GitHub's live labels to exactly this
# file (create missing, update color/description drift, warn on any label
# present on GitHub but not listed here — it does not delete unlisted
# labels, since a label attached to open issues/PRs is real repository
# state this file should catch up to, not silently erase).
#
# To add or change a label: edit this file, then run
#   python scripts/sync_labels.py --apply
# Exported from live GitHub state on 2026-07-20.

