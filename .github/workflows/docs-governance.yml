name: Documentation Governance

on:
  pull_request:
  push:
    branches:
      - main
      - docs/**
      - architecture/**
      - research/**

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate document governance
        run: python scripts/validate_docs.py

      - name: Verify machine-readable registries are current
        run: python scripts/generate_registries.py --check
