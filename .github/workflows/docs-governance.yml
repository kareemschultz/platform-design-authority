name: Documentation Governance

on:
  pull_request:
  push:
    branches:
      - main
      - docs/**
      - architecture/**
      - research/**

permissions:
  contents: write

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate document governance
        run: python scripts/validate_docs.py

      - name: Generate machine-readable registries
        run: python scripts/generate_registries.py

      - name: Upload generated registries
        uses: actions/upload-artifact@v4
        with:
          name: generated-registries
          path: |
            registry/documents.json
            registry/capabilities.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit refreshed registries
        if: >-
          github.actor != 'github-actions[bot]' &&
          (github.event_name == 'push' ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          if [ -z "$(git status --porcelain -- registry/documents.json registry/capabilities.json)" ]; then
            echo "Generated registries are current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry/documents.json registry/capabilities.json
          git commit -m "build: refresh generated documentation registries"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
