name: Documentation Governance

on:
  pull_request:
  push:
    branches:
      - main
      - docs/**
      - architecture/**
      - research/**

permissions:
  contents: write

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Check out pull request revision
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate document governance
        id: validate
        shell: bash
        run: |
          set +e
          python scripts/validate_docs.py > validation-report.txt 2>&1
          status=$?
          cat validation-report.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-validation-report
          path: validation-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail when governance validation fails
        if: steps.validate.outputs.status != '0'
        run: exit 1

      - name: Generate machine-readable registries
        run: python scripts/generate_registries.py

      - name: Upload generated registries
        uses: actions/upload-artifact@v4
        with:
          name: generated-registries
          path: |
            registry/documents.json
            registry/capabilities.json
            registry/events.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit refreshed registries
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry/documents.json registry/capabilities.json registry/events.json
          if git diff --cached --quiet; then
            echo "Registries are already current."
          else
            git commit -m "chore: refresh documentation registries"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Verify generated output is clean
        if: github.actor == 'github-actions[bot]' || github.event_name == 'pull_request'
        run: git diff --exit-code -- registry/documents.json registry/capabilities.json registry/events.json
