name: Documentation Governance

on:
  pull_request:
  push:
    branches:
      - main
      - docs/**
      - architecture/**
      - research/**

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out evaluated revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Test public-disclosure guard
        run: python -m unittest scripts/test_check_public_disclosure.py

      - name: Check public disclosure
        run: python scripts/check_public_disclosure.py

      - name: Test document-ID collision guard
        run: python -m unittest scripts/test_check_document_id_collisions.py

      - name: Check document-ID collisions against origin/main
        run: python scripts/check_document_id_collisions.py

      - name: Install pinned governance validator dependency
        run: python -m pip install --disable-pip-version-check --no-cache-dir jsonschema==4.26.0

      - name: Validate documentation and contracts
        id: validate
        shell: bash
        run: |
          set +e
          python scripts/validate_docs.py > validation-report.txt 2>&1
          status=$?
          cat validation-report.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: documentation-validation-report
          path: validation-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail when validation fails
        if: steps.validate.outputs.status != '0'
        run: exit 1

      - name: Verify generated registries are current
        run: |
          python -m unittest scripts/test_generate_registries.py
          python scripts/generate_registries.py --check

      - name: Test and validate UI governance (provenance, catalog, palette)
        run: |
          python -m unittest scripts/test_validate_ui_governance.py
          python scripts/validate_ui_governance.py

      - name: Test and validate codename and public-brand boundary
        run: |
          python -m unittest scripts/test_validate_codename_boundary.py
          python scripts/validate_codename_boundary.py

      - name: Test pull-request governance contract
        run: python -m unittest scripts/test_validate_pr_governance.py

      - name: Validate pull-request governance contract
        if: github.event_name == 'pull_request'
        run: python scripts/validate_pr_governance.py --event-path "$GITHUB_EVENT_PATH"

      - name: Test repository-root scanning invariant
        run: python -m unittest scripts/test_repository_scanning.py

      - name: Test local gate-runner parity with these workflows
        run: python -m unittest scripts/test_run_gates.py

      - name: Test and validate canonical document indexes
        run: |
          python -m unittest scripts/test_validate_document_indexes.py
          python scripts/validate_document_indexes.py

      - name: Test and validate adopted document classes
        run: |
          python -m unittest scripts/test_validate_document_classes.py
          python scripts/validate_document_classes.py

      - name: Test and validate product documentation
        run: |
          python -m unittest scripts/test_generate_api_reference.py
          python scripts/generate_api_reference.py --check
          python -m unittest scripts/test_validate_product_docs.py
          python scripts/validate_product_docs.py

      - name: Test and validate competitive-research registration
        run: |
          python -m unittest scripts/test_validate_research_registration.py
          python scripts/validate_research_registration.py

      - name: Test and validate capability-family readiness
        run: |
          python -m unittest scripts/test_validate_capability_readiness.py
          python scripts/validate_capability_readiness.py

      - name: Test and validate ratification-wave evidence gates
        run: |
          python -m unittest scripts/test_validate_ratification_waves.py
          python scripts/validate_ratification_waves.py

      - name: Test and validate operational-readiness evidence gates
        run: |
          python -m unittest scripts/test_validate_operational_readiness.py
          python scripts/validate_operational_readiness.py
