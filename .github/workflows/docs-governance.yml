name: Documentation Governance

on:
  pull_request:
  push:
    branches:
      - main
      - docs/**
      - architecture/**
      - research/**

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate document governance
        run: python scripts/validate_docs.py

      - name: Generate machine-readable registries
        run: python scripts/generate_registries.py

      - name: Upload generated registries
        uses: actions/upload-artifact@v4
        with:
          name: generated-registries
          path: |
            registry/documents.json
            registry/capabilities.json
          if-no-files-found: error
          retention-days: 7
