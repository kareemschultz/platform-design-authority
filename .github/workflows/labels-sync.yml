name: Labels Sync

on:
  pull_request:
    paths:
      - ".github/labels.yml"
      - "scripts/sync_labels.py"
      - "scripts/test_sync_labels.py"
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"
      - "scripts/sync_labels.py"
      - "scripts/test_sync_labels.py"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check out evaluated revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pinned YAML dependency
        run: python -m pip install --disable-pip-version-check --no-cache-dir PyYAML==6.0.2

      - name: Test label sync
        run: python -m unittest scripts/test_sync_labels.py

      - name: Check label drift
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_labels.py --check

      - name: Apply labels to GitHub
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_labels.py --apply
