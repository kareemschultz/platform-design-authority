name: Meridian Prototype

on:
  pull_request:
    paths:
      - "meridian/**"
      - ".github/workflows/meridian-prototype.yml"
      - "CLAUDE.md"
      - "00-Foundation/**"
      - "01-Platform/BETTER_AUTH_PLUGIN_AND_FEATURE_DECISION_MATRIX.md"
      - "02-Architecture/POSTGRESQL_18_EXTENSION_DECISION_MATRIX.md"
      - "09-UX/SHADCN_CONFIGURATION_DECISION_MATRIX.md"
      - "14-Engineering/TECHNOLOGY_LIFECYCLE_AND_LESSONS.md"
      - "18-Decisions/ADR-0006-BETTER-AUTH-AS-AUTHENTICATION-FOUNDATION.md"
      - "18-Decisions/ADR-0020-BUN-HONO-ORPC-PREFERRED-PROTOTYPE-STACK.md"
      - "18-Decisions/ADR-0021-REPOSITORY-OWNED-DOCUMENTATION-PORTAL.md"
      - "18-Decisions/ADR-0022-BASE-UI-BACKED-SHADCN-PRIMITIVES.md"
      - "18-Decisions/ADR-0024-POSTGRESQL-18-MINIMAL-EXTENSION-POLICY.md"
      - "registry/**"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: meridian-prototype-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  meridian:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meridian
    env:
      # Fixed non-secret test fixtures; never reused outside this isolated CI job.
      BETTER_AUTH_SECRET: "ci-only-32-character-secret-value"
      BETTER_AUTH_TRUSTED_ORIGINS: "http://localhost:3000,http://localhost:3001"
      BETTER_AUTH_URL: "http://localhost:3000"
      CORS_ORIGIN: "http://localhost:3001"
      DATABASE_URL: "postgresql://postgres:ci-only-postgres-password@localhost:5432/meridian"
      NEXT_PUBLIC_SERVER_URL: "http://localhost:3000"
      POSTGRES_PASSWORD: "ci-only-postgres-password"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Ultracite
        run: bun run check

      - name: Typecheck
        run: bun run check-types

      - name: Migration freshness
        run: |
          bun run db:generate
          git diff --exit-code -- packages/db/src/migrations

      - name: Tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Node fallback health probe
        shell: bash
        run: |
          set -euo pipefail
          node apps/server/dist/node.mjs > /tmp/meridian-node.log 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/meridian-node.log
          exit 1

      - name: Generated registry freshness
        working-directory: .
        run: python scripts/generate_registries.py --check

      - name: Secret and prohibited surface scan
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE "(sk-[A-Za-z0-9]|OPENAI_API_KEY|OPENROUTER_API_KEY|POSTGRES_PASSWORD:-password|@ai-sdk|openrouter|devtools|/ai|/todos)" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.turbo \
            --exclude-dir=dist --exclude-dir=.source --exclude=bun.lock .; then
            echo "Prohibited secret or generated example surface found" >&2
            exit 1
          fi
          if git grep -n "@latest" -- "*.json" "*.jsonc" "*.yml" "*.yaml" ":!bts.jsonc"; then
            echo "Unpinned @latest selector found in active configuration" >&2
            exit 1
          fi

      - name: Dependency audit
        run: bun audit

      - name: Compose config validation
        run: docker compose config --quiet

      - name: PostgreSQL 18.4 baseline smoke test
        shell: bash
        run: |
          set -euo pipefail
          trap 'docker compose down -v --remove-orphans' EXIT
          docker compose up -d postgres
          cid=$(docker compose ps -q postgres)
          for attempt in {1..30}; do
            if [ "$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$cid")" = "healthy" ]; then
              break
            fi
            sleep 1
          done
          [ "$(docker inspect --format '{{.State.Health.Status}}' "$cid")" = "healthy" ]
          docker compose exec -T postgres psql -U postgres -d meridian -Atc \
            "SELECT current_setting('server_version') LIKE '18.4%';" | grep -qx t
          docker compose exec -T postgres psql -U postgres -d meridian -Atc \
            "SELECT extname FROM pg_extension ORDER BY extname;" | grep -qxF $'pg_stat_statements\nplpgsql'
          docker compose exec -T postgres psql -U postgres -d meridian -Atc \
            "SHOW shared_preload_libraries;" | grep -qx pg_stat_statements

      - name: Docker image build validation
        run: docker compose build web server

      - name: Docker stack runtime validation
        shell: bash
        run: |
          set -euo pipefail
          trap 'docker compose down -v --remove-orphans' EXIT
          docker compose up -d postgres server web
          for attempt in {1..30}; do
            if docker compose ps --format json | grep -q '"Health":"unhealthy"'; then
              docker compose logs
              exit 1
            fi
            server_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$(docker compose ps -q server)")
            web_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$(docker compose ps -q web)")
            if [ "$server_health" = healthy ] && [ "$web_health" = healthy ]; then
              break
            fi
            sleep 1
          done
          [ "$(docker inspect --format '{{.State.Health.Status}}' "$(docker compose ps -q server)")" = healthy ]
          [ "$(docker inspect --format '{{.State.Health.Status}}' "$(docker compose ps -q web)")" = healthy ]
          docker compose exec -T server bun run --cwd /app/packages/db db:migrate
          curl --fail --silent --show-error http://127.0.0.1:3000/ | grep -qx OK
          curl --fail --silent --show-error http://127.0.0.1:3001/ >/dev/null
