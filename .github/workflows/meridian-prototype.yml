name: Meridian Prototype

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "ops/**"
      - ".dockerignore"
      - ".gitattributes"
      - "biome.json"
      - "bts.jsonc"
      - "bun.lock"
      - "docker-compose.yml"
      - "package.json"
      - "LICENSE*"
      - "LICENCE*"
      - "COPYING*"
      - "THIRD_PARTY_NOTICES.md"
      - "third_party/**"
      - "tsconfig.json"
      - "turbo.json"
      - ".github/workflows/meridian-prototype.yml"
      - "CLAUDE.md"
      - "docs/blueprint/00-Foundation/**"
      - "docs/blueprint/01-Platform/BETTER_AUTH_PLUGIN_AND_FEATURE_DECISION_MATRIX.md"
      - "docs/blueprint/02-Architecture/POSTGRESQL_18_EXTENSION_DECISION_MATRIX.md"
      - "docs/blueprint/09-UX/SHADCN_CONFIGURATION_DECISION_MATRIX.md"
      - "docs/blueprint/14-Engineering/TECHNOLOGY_LIFECYCLE_AND_LESSONS.md"
      - "docs/blueprint/18-Decisions/ADR-0006-BETTER-AUTH-AS-AUTHENTICATION-FOUNDATION.md"
      - "docs/blueprint/18-Decisions/ADR-0020-BUN-HONO-ORPC-PREFERRED-PROTOTYPE-STACK.md"
      - "docs/blueprint/18-Decisions/ADR-0021-REPOSITORY-OWNED-DOCUMENTATION-PORTAL.md"
      - "docs/blueprint/18-Decisions/ADR-0022-BASE-UI-BACKED-SHADCN-PRIMITIVES.md"
      - "docs/blueprint/18-Decisions/ADR-0024-POSTGRESQL-18-MINIMAL-EXTENSION-POLICY.md"
      - "evidence/first-slice/**"
      - "registry/**"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: meridian-prototype-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  meridian:
    runs-on: ubuntu-latest
    env:
      # Fixed non-secret test fixtures; never reused outside this isolated CI job.
      BETTER_AUTH_SECRET: "ci-only-32-character-secret-value"
      BETTER_AUTH_TRUSTED_ORIGINS: "http://localhost:3000,http://localhost:3001"
      BETTER_AUTH_URL: "http://localhost:3000"
      IDENTITY_DISPLAY_NAME: "Business Operating Platform"
      CORS_ORIGIN: "http://localhost:3001"
      DATABASE_URL: "postgresql://postgres:ci-only-postgres-password@localhost:5432/meridian"
      NEXT_PUBLIC_SERVER_URL: "http://localhost:3000"
      POSTGRES_PASSWORD: "ci-only-postgres-password"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Changesets determines changed packages from the merge base with main.
          # A shallow checkout cannot reliably resolve that divergence in PR CI.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Install Chromium browser
        run: bun run --cwd apps/web test:e2e:install

      - name: Prepare Changesets base ref
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git show-ref --verify --quiet refs/heads/main || git branch main refs/remotes/origin/main

      - name: Changeset metadata
        run: bun run changeset:status

      - name: Ultracite
        run: bun run check

      - name: Typecheck
        run: bun run check-types

      - name: Architecture dependency rules
        run: |
          bun run architecture:check
          python scripts/test_architecture_checker.py

      - name: Third-party provenance baseline
        run: |
          bun run third-party:test
          bun run third-party:check

      - name: Migration freshness
        run: |
          bun run db:generate
          git diff --exit-code -- packages/persistence/platform-identity-postgres/src/migrations packages/persistence/platform-tenancy-postgres/src/migrations packages/persistence/platform-entitlements-postgres/src/migrations packages/persistence/platform-audit-postgres/src/migrations packages/persistence/platform-events-postgres/src/migrations packages/persistence/platform-import-export-postgres/src/migrations packages/persistence/platform-numbering-postgres/src/migrations packages/persistence/party-postgres/src/migrations packages/persistence/catalog-postgres/src/migrations packages/persistence/inventory-postgres/src/migrations

      - name: Tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Node fallback health probe
        shell: bash
        run: |
          set -euo pipefail
          node apps/server/dist/node.mjs > /tmp/meridian-node.log 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/meridian-node.log
          exit 1

      - name: Generated registry freshness
        run: |
          python scripts/generate_registries.py --check
          bun run ws1:evidence:check
          bun run ws2:evidence:check

      - name: Generated contract freshness
        run: python scripts/generate_contracts.py --check

      - name: UI governance (provenance, catalog, palette)
        run: |
          python -m unittest scripts/test_validate_ui_governance.py
          python scripts/validate_ui_governance.py

      - name: Secret and prohibited surface scan
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE "(\bsk-[A-Za-z0-9]{20,}|OPENAI_API_KEY|OPENROUTER_API_KEY|POSTGRES_PASSWORD:-password|@ai-sdk|openrouter|devtools|/ai|/todos)" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.turbo \
            --exclude-dir=dist --exclude-dir=.source --exclude=bun.lock --exclude='*.tsbuildinfo' \
            apps packages ops package.json biome.json turbo.json docker-compose.yml; then
            echo "Prohibited secret or generated example surface found" >&2
            exit 1
          fi
          # Premium UI source credentials and private download/API URLs (shadcn
          # Studio Pro, Mobbin Pro, Magic UI Pro): CLAUDE.md/AGENTS.md §8
          # prohibits committing these; this is the enforcement, not a
          # nonexistent lint rule. Scoped to an assigned value that is not a
          # ${VAR} placeholder, so the governed components.json pattern of
          # referencing these credentials via environment-variable
          # interpolation (never a literal value) is not a false positive,
          # and ordinary license-text discussion in comments is not either.
          # LC_ALL=C.UTF-8 is required for grep -P (PCRE lookahead).
          if LC_ALL=C.UTF-8 grep -RInP '(shadcnstudio\.com/(api|download|private)|mobbin\.com/(api|token)|magicui(pro)?\.(com|design)/(download|license|api)|(MOBBIN|STUDIO)_(TOKEN|API|LICENSE)[_A-Z]*"?\s*[:=]\s*(?:"(?!\$\{)|(?!\$|")\S)|license[_-]?key"?\s*[:=]\s*(?:"(?!\$\{)|(?!\$|")\S))' \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.turbo \
            --exclude-dir=dist --exclude-dir=.source --exclude=bun.lock --exclude='*.tsbuildinfo' \
            apps packages ops package.json biome.json turbo.json docker-compose.yml; then
            echo "Prohibited premium-license credential or private download URL found" >&2
            exit 1
          fi
          if grep -RIn "@latest" --include='*.json' --include='*.jsonc' --include='*.yml' --include='*.yaml' \
            --exclude=bts.jsonc --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.turbo \
            apps packages package.json biome.json turbo.json docker-compose.yml; then
            echo "Unpinned @latest selector found in active configuration" >&2
            exit 1
          fi

      - name: Dependency audit
        run: bun audit

      - name: Compose config validation
        run: docker compose config --quiet

      - name: PostgreSQL 18.4 baseline smoke test
        shell: bash
        run: |
          set -euo pipefail
          trap 'docker compose down -v --remove-orphans' EXIT
          docker compose up -d postgres
          cid=$(docker compose ps -q postgres)
          for attempt in {1..30}; do
            if [ "$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$cid")" = "healthy" ]; then
              break
            fi
            sleep 1
          done
          [ "$(docker inspect --format '{{.State.Health.Status}}' "$cid")" = "healthy" ]
          docker compose exec -T postgres psql -U postgres -d meridian -Atc \
            "SELECT current_setting('server_version') LIKE '18.4%';" | grep -qx t
          docker compose exec -T postgres psql -U postgres -d meridian -Atc \
            "SELECT extname FROM pg_extension ORDER BY extname;" | grep -qxF $'pg_stat_statements\nplpgsql'
          docker compose exec -T postgres psql -U postgres -d meridian -Atc \
            "SHOW shared_preload_libraries;" | grep -qx pg_stat_statements

      - name: Docker image build validation
        run: docker compose build web server worker

      - name: Docker stack runtime validation
        shell: bash
        run: |
          set -euo pipefail
          trap 'docker compose down -v --remove-orphans' EXIT
          docker compose up -d postgres server web worker
          for attempt in {1..30}; do
            if docker compose ps --format json | grep -q '"Health":"unhealthy"'; then
              docker compose logs
              exit 1
            fi
            server_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$(docker compose ps -q server)")
            web_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$(docker compose ps -q web)")
            if [ "$server_health" = healthy ] && [ "$web_health" = healthy ]; then
              break
            fi
            sleep 1
          done
          [ "$(docker inspect --format '{{.State.Health.Status}}' "$(docker compose ps -q server)")" = healthy ]
          [ "$(docker inspect --format '{{.State.Health.Status}}' "$(docker compose ps -q web)")" = healthy ]
          [ "$(docker inspect --format '{{.State.Running}}' "$(docker compose ps -q worker)")" = true ]
          docker compose exec -T server bun run db:migrate
          docker compose exec -T server bun run db:test
          docker compose exec -T server bun run db:test:node
          docker compose stop worker
          docker compose run --rm worker bun run db:test
          worker_node_database=meridian_worker_node_check
          worker_node_database_url="postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${worker_node_database}"
          docker compose exec -T postgres createdb -U postgres "$worker_node_database"
          docker compose exec -T -e DATABASE_URL="$worker_node_database_url" server bun run db:migrate
          docker compose run --rm -e DATABASE_URL="$worker_node_database_url" worker bun run test:node
          docker compose exec -T postgres dropdb -U postgres --force "$worker_node_database"
          curl --fail --silent --show-error http://127.0.0.1:3000/ | grep -qx OK
          curl --fail --silent --show-error http://127.0.0.1:3001/ >/dev/null
          docker compose exec -T server bun run e2e:seed
          bun run --cwd apps/web test:e2e

      - name: Retain browser evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-evidence
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 14
