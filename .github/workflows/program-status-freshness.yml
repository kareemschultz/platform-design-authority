name: Program Status Freshness

on:
  pull_request:
    paths:
      - "docs/project/PROGRAM_STATUS.md"
      - "docs/project/PROGRESS_MEASUREMENT_STANDARD.md"
      - ".github/workflows/program-status-freshness.yml"
      - "scripts/validate_program_status.py"
      - "scripts/test_validate_program_status.py"
  push:
    branches:
      - main
    paths:
      - "docs/project/PROGRAM_STATUS.md"
      - "docs/project/PROGRESS_MEASUREMENT_STANDARD.md"
      - ".github/workflows/program-status-freshness.yml"
      - "scripts/validate_program_status.py"
      - "scripts/test_validate_program_status.py"
  schedule:
    # A path-triggered check only re-runs when PROGRAM_STATUS.md changes, so
    # it goes blind when the world changes instead (an issue closes, a board
    # is created). Twice weekly is enough to catch that drift without paging
    # anyone for a document that changes on its own multi-day cadence.
    - cron: "0 6 * * 1,4"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  validate-program-status:
    runs-on: ubuntu-latest
    steps:
      - name: Check out evaluated revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate PROGRAM_STATUS.md freshness and internal consistency
        id: validate
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python -m unittest scripts/test_validate_program_status.py > program-status-validation-report.txt 2>&1
          test_status=$?
          if [ "$test_status" -eq 0 ]; then
            python scripts/validate_program_status.py >> program-status-validation-report.txt 2>&1
            status=$?
          else
            status=$test_status
          fi
          cat program-status-validation-report.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: program-status-validation-report
          path: program-status-validation-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail when validation fails
        if: steps.validate.outputs.status != '0'
        run: exit 1

      - name: Open or update a tracking issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          existing=$(gh issue list --state open --label program-status-stale --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Scheduled Program Status Freshness check failed again: ${run_url}"
          else
            body=$'The scheduled (twice-weekly) Program Status Freshness workflow failed outside of any pull request or push to main, so no PR check surfaced it. See the run for the exact validator output: '"${run_url}"$'\n\nClose this issue once docs/project/PROGRAM_STATUS.md is refreshed and the workflow passes on its next scheduled or manual run.'
            gh issue create \
              --title "PROGRAM_STATUS.md failed the scheduled freshness check" \
              --label program-status-stale \
              --label documentation \
              --body "$body"
          fi
