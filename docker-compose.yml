name: meridian

# Local controlled-prototype stack only. It is not a production deployment
# contract and intentionally keeps PostgreSQL off the host network.
services:
  web:
    image: meridian-web:prototype-2026-07-12
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    init: true
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - path: apps/web/.env
        required: false
    environment:
      NEXT_PUBLIC_SERVER_URL: http://server:3000
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  server:
    image: meridian-server:prototype-2026-07-12
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    init: true
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      # This Compose file is a loopback-only development prototype. Production
      # rejects HTTP trusted origins and requires an HTTPS deployment contract.
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3001
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET to at least 32 characters for local Compose}
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3000,http://localhost:3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for local Compose}@postgres:5432/meridian
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18.4@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_DB: meridian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for local Compose}
    volumes:
      - meridian_postgres_data:/var/lib/postgresql
      - ./ops/postgres/001-approved-extensions.sql:/docker-entrypoint-initdb.d/001-approved-extensions.sql:ro
      - ./ops/postgres:/ops/postgres:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  meridian_postgres_data:
