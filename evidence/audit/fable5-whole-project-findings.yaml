    invalidates_evidence: false
    reopens_risk: false
    blocks: [controlled-prototype-closure-claim]
    disposition: decide
    remediation: Treat this whole-project audit as the superseding exact-main disposition, OR record a dedicated exact-main re-review; update PDA-IMPL-007 §2 PR7 row, WS2 plan, risk register with the actual sequence
