openapi: 3.1.0
info:
  title: Business Operating Platform First Slice API
  version: 0.5.0
  description: >-
    Draft implementation-review contract for the Guyana Retail Foundation Slice.
    This is not a GA public API and does not assert production provider or jurisdiction certification.
    Operations without detailed payload schemas are route and authority seams; their request and response
    schemas require completion before implementation review and generated SDK acceptance.
servers:
  - url: https://api.example.invalid/v1
    description: Placeholder only
security:
  - sessionCookie: []
tags:
  - name: Identity
  - name: Parties
  - name: Catalog
  - name: Inventory
  - name: Commerce
  - name: Payment
  - name: StoredValue
  - name: Devices
  - name: Exports
  - name: Events
  - name: Webhooks
  - name: Privacy
paths:
  /me:
    get:
      tags: [Identity]
      operationId: getCurrentIdentity
      x-authorization: authenticated_session
      parameters:
        - $ref: '#/components/parameters/ActiveContextId'
      responses:
        '200':
          description: Current authenticated identity and active context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentIdentity'
        default:
          $ref: '#/components/responses/Error'
  /organizations:
    get:
      tags: [Identity]
      operationId: listOrganizations
      x-permission: platform.organization.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/PagedOrganizations'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}:
    get:
      tags: [Identity]
      operationId: getOrganization
      x-permission: platform.organization.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - {name: organizationId, in: path, required: true, schema: {$ref: '#/components/schemas/Identifier'}}
      responses:
        '200':
          description: Organization in the authenticated tenant
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Organization'}
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Identity]
      operationId: updateOrganization
      x-permission: platform.organization.update
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - {name: organizationId, in: path, required: true, schema: {$ref: '#/components/schemas/Identifier'}}
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateOrganizationRequest'}
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Organization'}
        default:
          $ref: '#/components/responses/Error'
  /locations:
    get:
      tags: [Identity]
      operationId: listLocations
      x-permission: platform.organization.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - {name: organizationId, in: query, required: true, schema: {$ref: '#/components/schemas/Identifier'}}
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Locations in the requested authorized organization
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedLocations'}
        default:
          $ref: '#/components/responses/Error'
  /session/active-context:
    post:
      tags: [Identity]
      operationId: setActiveContext
      x-authorization: authenticated_membership
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiveContextRequest'
      responses:
        '201':
          description: Server-verified, tab-safe context reference created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActiveContext'}
        default:
          $ref: '#/components/responses/Error'
  /sessions:
    get:
      tags: [Identity]
      operationId: listCurrentUserSessions
      x-authorization: authenticated_session
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Database-current sessions owned by the authenticated account
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedSessions'}
        default:
          $ref: '#/components/responses/Error'
  /sessions/{sessionId}:
    delete:
      tags: [Identity]
      operationId: revokeCurrentUserSession
      x-authorization: authenticated_session
      parameters:
        - {name: sessionId, in: path, required: true, schema: {$ref: '#/components/schemas/Identifier'}}
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Session revoked or already absent
        default:
          $ref: '#/components/responses/Error'
  /parties:
    get:
      tags: [Parties]
      operationId: listParties
      x-permission: party.record.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: query
          in: query
          schema: {type: string, maxLength: 200}
      responses:
        '200':
          description: Authorized Party results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedParties'
        default:
          $ref: '#/components/responses/Error'
  /parties/persons:
    post:
      tags: [Parties]
      operationId: createPersonParty
      x-permission: party.record.create
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersonParty'
      responses:
        '201':
          description: Party created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Party'
        default:
          $ref: '#/components/responses/Error'
  /products:
    get:
      tags: [Catalog]
      operationId: listProducts
      x-permission: catalog.product.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: query
          in: query
          schema: {type: string, maxLength: 200}
        - name: barcode
          in: query
          schema: {type: string, maxLength: 64}
        - name: sku
          in: query
          schema: {type: string, minLength: 1, maxLength: 64, pattern: '.*\S.*'}
        - name: state
          in: query
          schema: {type: string, enum: [Draft, Active, Suspended, Discontinued, Archived]}
      responses:
        '200':
          description: Product results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedProducts'
    post:
      tags: [Catalog]
      operationId: createProduct
      x-permission: catalog.product.create
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProduct'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  /stock-balances:
    get:
      tags: [Inventory]
      operationId: listStockBalances
      x-permission: inventory.balance.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: locationId
          in: query
          required: true
          schema: {$ref: '#/components/schemas/Identifier'}
        - name: productId
          in: query
          schema: {$ref: '#/components/schemas/Identifier'}
      responses:
        '200':
          description: Current stock projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedStockBalances'
  /inventory-adjustments:
    get:
      tags: [Inventory]
      operationId: listInventoryAdjustments
      x-permission: inventory.adjustment.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - {name: locationId, in: query, schema: {$ref: '#/components/schemas/Identifier'}}
        - {name: state, in: query, schema: {type: string, enum: [Draft, PendingApproval, Approved, Posted, Reversed, Rejected]}}
      responses:
        '200':
          description: Tenant-scoped adjustment results
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedInventoryAdjustments'}
    post:
      tags: [Inventory]
      operationId: createInventoryAdjustment
      x-permission: inventory.adjustment.create
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateInventoryAdjustment'}
      responses:
        '202':
          description: Adjustment created or awaiting approval
          content:
            application/json:
              schema: {$ref: '#/components/schemas/InventoryAdjustment'}
  /stock-counts:
    get:
      tags: [Inventory]
      operationId: listStockCounts
      x-permission: inventory.count.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - {name: locationId, in: query, schema: {$ref: '#/components/schemas/Identifier'}}
        - {name: state, in: query, schema: {type: string, enum: [Draft, InProgress, Submitted, Approved, Posted, Rejected]}}
      responses:
        '200':
          description: Tenant-scoped count results
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedStockCounts'}
    post:
      tags: [Inventory]
      operationId: createStockCount
      x-permission: inventory.count.create
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateStockCount'}
      responses:
        '201':
          description: Stock count created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/StockCount'}
  /stock-transfers:
    get:
      tags: [Inventory]
      operationId: listStockTransfers
      x-permission: inventory.transfer.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - {name: locationId, in: query, schema: {$ref: '#/components/schemas/Identifier'}}
        - {name: state, in: query, schema: {type: string, enum: [Draft, Dispatched, PartiallyReceived, Received, Exception, Cancelled]}}
      responses:
        '200':
          description: Tenant-scoped transfer results
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedStockTransfers'}
    post:
      tags: [Inventory]
      operationId: createStockTransfer
      x-permission: inventory.transfer.create
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateStockTransfer'}
      responses:
        '201':
          description: Transfer created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/StockTransfer'}
  /registers/{registerId}/open:
    post:
      tags: [Commerce]
      operationId: openRegister
      x-permission: commerce.register.open
      parameters:
        - $ref: '#/components/parameters/RegisterId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/OpenRegisterRequest'}
      responses:
        '200':
          description: Register opened
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RegisterSession'}
  /registers/{registerId}/close:
    post:
      tags: [Commerce]
      operationId: closeRegister
      x-permission: commerce.register.close
      parameters:
        - $ref: '#/components/parameters/RegisterId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CloseRegisterRequest'}
      responses:
        '200':
          description: Register closed or variance review required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RegisterSession'}
  /sales:
    post:
      tags: [Commerce]
      operationId: createSale
      x-permission: commerce.sale.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateSale'}
      responses:
        '201':
          description: Sale draft created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sale'}
  /sales/{saleId}/complete:
    post:
      tags: [Commerce]
      operationId: completeSale
      x-permission: commerce.sale.complete
      parameters:
        - $ref: '#/components/parameters/SaleId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CompleteSaleRequest'}
      responses:
        '200':
          description: Sale completed, pending, or reconciliation required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sale'}
  /returns:
    get:
      tags: [Commerce]
      operationId: listReturns
      x-permission: commerce.return.approve
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - {name: state, in: query, schema: {type: string, enum: [Pending, Completed]}}
      responses:
        '200':
          description: WS3 remediation R3b, Item 7 - server-backed pending-approval queue for commerce.return.approve, reusing that exact permission (no new identifier invented). Replaces copying an opaque Return ID between users/browsers.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedReturns'}
    post:
      tags: [Commerce]
      operationId: createReturn
      x-permission: commerce.return.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateReturn'}
      responses:
        '201':
          description: Return created, Pending checker approval
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Return'}
  /deposits:
    get:
      tags: [Commerce]
      operationId: listDeposits
      x-permission: commerce.deposit.confirm
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - {name: state, in: query, schema: {type: string, enum: [Prepared, Reconciled]}}
      responses:
        '200':
          description: WS3 remediation R3b, Item 7 - server-backed pending-confirmation queue for commerce.deposit.confirm, reusing that exact permission (no new identifier invented). Replaces copying an opaque Deposit ID between users/browsers.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedDeposits'}
    post:
      tags: [Commerce]
      operationId: createDeposit
      x-permission: commerce.deposit.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateDeposit'}
      responses:
        '201':
          description: Deposit prepared (effect-free); reserves the counted amount against available safe custody, no custody transfer posted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Deposit'}
  /payment-intents:
    post:
      tags: [Payment]
      operationId: createPaymentIntent
      x-permission: payment.intent.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreatePaymentIntent'}
      responses:
        '201':
          description: Payment intent created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PaymentIntent'}
  /payment-intents/{paymentIntentId}/confirm:
    post:
      tags: [Payment]
      operationId: confirmPaymentIntent
      x-permission: payment.intent.confirm
      parameters:
        - $ref: '#/components/parameters/PaymentIntentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Current confirmed, pending, failed, or uncertain state
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PaymentIntent'}
  /stored-value-instruments:
    post:
      tags: [StoredValue]
      operationId: issueStoredValueInstrument
      x-permission: commerce.stored-value.issue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/IssueStoredValueInstrument'}
      responses:
        '201':
          description: Instrument issued
  /stored-value-instruments/{instrumentId}/reserve:
    post:
      tags: [StoredValue]
      operationId: reserveStoredValue
      x-permission: commerce.stored-value.reserve
      parameters:
        - $ref: '#/components/parameters/InstrumentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ReserveStoredValue'}
      responses:
        '201':
          description: Reservation created
  /devices/enroll:
    post:
      tags: [Devices]
      operationId: enrollDevice
      x-permission: platform.device.enroll
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EnrollDevice'}
      responses:
        '201':
          description: Device enrollment created
  /offline-leases:
    post:
      tags: [Devices]
      operationId: issueOfflineLease
      x-permission: platform.offline-lease.issue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: Signed offline lease issued
  /sync/batches:
    post:
      tags: [Devices]
      operationId: submitSyncBatch
      x-permission: platform.sync-batch.submit
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '../schemas/offline/sync-batch-v1.schema.json'}
      responses:
        '202':
          description: Batch accepted for validation and application
  /exports/accountant-handoff:
    post:
      tags: [Exports]
      operationId: createAccountantHandoffExport
      x-permission: platform.export.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AccountantHandoffRequest'}
      responses:
        '202':
          description: Export job created; deterministic and idempotent for the same bounded range and source data
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AccountantHandoffExport'}
  /webhook-subscriptions:
    post:
      tags: [Webhooks]
      operationId: createWebhookSubscription
      x-permission: developer.webhook.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateWebhookSubscription'}
      responses:
        '201':
          description: Subscription created
    get:
      tags: [Webhooks]
      operationId: getWebhookSubscriptions
      x-permission: developer.webhook.read
      responses:
        '200':
          description: Contract response; the owning specification defines state and error semantics
  /privacy-requests:
    post:
      tags: [Privacy]
      operationId: createPrivacyRequest
      x-permission: security.privacy-request.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreatePrivacyRequest'}
      responses:
        '201':
          description: Privacy case created
  /entitlements:
    get:
      tags: [Identity]
      operationId: getEntitlements
      x-permission: platform.entitlement.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Effective capability entitlements for the active tenant context
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedEntitlements'}
        default:
          $ref: '#/components/responses/Error'
  /users:
    get:
      tags: [Identity]
      operationId: getUsers
      x-permission: platform.user.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - {name: query, in: query, schema: {type: string, maxLength: 200}}
      responses:
        '200':
          description: Tenant memberships joined to safe authentication-account and Party references
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedUsers'}
        default:
          $ref: '#/components/responses/Error'
  /users/invitations:
    post:
      tags: [Identity]
      operationId: postUsersInvitations
      x-permission: platform.user.invite
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateUserInvitationRequest'}
      responses:
        '202':
          description: Authoritative tenant invitation accepted for idempotent provisioning and delivery
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserInvitation'}
        default:
          $ref: '#/components/responses/Error'
  /users/{userId}/suspend:
    post:
      tags: [Identity]
      operationId: suspendTenantMembership
      x-permission: platform.user.suspend
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - {name: userId, in: path, required: true, schema: {$ref: '#/components/schemas/Identifier'}}
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SuspendTenantMembershipRequest'}
      responses:
        '200':
          description: Membership in the active tenant suspended; unrelated tenant memberships are unchanged
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserSummary'}
        default:
          $ref: '#/components/responses/Error'
  /roles:
    get:
      tags: [Identity]
      operationId: getRoles
      x-permission: platform.role.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Roles defined for the active tenant
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PagedRoles'}
        default:
          $ref: '#/components/responses/Error'
  /role-assignments:
    post:
      tags: [Identity]
      operationId: postRoleAssignments
      x-permission: platform.role.assign
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateRoleAssignmentRequest'}
      responses:
        '201':
          description: Scoped role assignment granted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RoleAssignment'}
        default:
          $ref: '#/components/responses/Error'
  /audit-records:
    get:
      tags: [Identity]
      operationId: getAuditRecords
      x-permission: platform.audit.read
      parameters:
        - $ref: '#/components/parameters/RequiredActiveContextId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - {name: actorUserId, in: query, schema: {$ref: '#/components/schemas/Identifier'}}
