      name: __Host-platform_session
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: {type: string}
    Limit:
      name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 200, default: 50}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 16, maxLength: 128}
    ExpectedVersion:
      name: If-Match
      in: header
      required: true
      description: Positive aggregate version required for an explicit state transition.
      schema: {type: string, pattern: '^[1-9][0-9]*$'}
    ActiveContextId:
      name: X-Active-Context-Id
      in: header
      required: false
      description: >-
        Opaque server-issued context reference bound to the authenticated session. It selects a tab-local
        workspace but is never trusted as authority without current membership validation.
      schema: {$ref: '#/components/schemas/Identifier'}
    RequiredActiveContextId:
      name: X-Active-Context-Id
      in: header
      required: true
      description: >-
        Opaque server-issued context reference bound to the authenticated session. Required for tenant-scoped
        operations and revalidated against current membership and policy; never accepted as standalone authority.
      schema: {$ref: '#/components/schemas/Identifier'}
    RegisterId:
      name: registerId
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Identifier'}
    SaleId:
      name: saleId
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Identifier'}
    PaymentIntentId:
      name: paymentIntentId
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Identifier'}
    InstrumentId:
      name: instrumentId
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Identifier'}
  responses:
    Error:
      description: Structured error
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    PagedOrganizations:
      description: Organizations
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items: {$ref: '#/components/schemas/Organization'}
              nextCursor: {type: [string, 'null']}
  schemas:
    Identifier:
      type: string
      pattern: '^[A-Za-z0-9_-]{12,64}$'
    EventName:
      type: string
      pattern: '^[a-z][a-z0-9-]*\.[a-z][a-z0-9-]*\.[a-z][a-z0-9-]*\.v[1-9][0-9]*$'
    SemanticVersion:
      type: string
      pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
    PositiveSequence:
      type: string
      pattern: '^[1-9][0-9]{0,18}$'
    CreateEventReplayRequest:
      type: object
      additionalProperties: false
      required: [consumerId, consumerSchemaVersion, firstSequence, lastSequence, eventNames, purpose]
      properties:
        consumerId: {$ref: '#/components/schemas/Identifier'}
        consumerSchemaVersion: {$ref: '#/components/schemas/SemanticVersion'}
        firstSequence: {$ref: '#/components/schemas/PositiveSequence'}
        lastSequence: {$ref: '#/components/schemas/PositiveSequence'}
        eventNames:
          type: array
          minItems: 1
          maxItems: 25
          uniqueItems: true
          items: {$ref: '#/components/schemas/EventName'}
        purpose: {type: string, minLength: 1, maxLength: 500}
    EventReplayRequest:
      type: object
      additionalProperties: false
      required: [id, consumerId, consumerSchemaVersion, firstSequence, lastSequence, eventNames, state, requestedAt]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        consumerId: {$ref: '#/components/schemas/Identifier'}
        consumerSchemaVersion: {$ref: '#/components/schemas/SemanticVersion'}
        firstSequence: {$ref: '#/components/schemas/PositiveSequence'}
        lastSequence: {$ref: '#/components/schemas/PositiveSequence'}
        eventNames:
          type: array
          minItems: 1
          maxItems: 25
          uniqueItems: true
          items: {$ref: '#/components/schemas/EventName'}
        state: {type: string, enum: [Pending, Running, Completed, PartiallyCompleted, Rejected, Failed]}
        requestedAt: {type: string, format: date-time}
    Money:
      type: object
      required: [currency, amountMinor]
      properties:
        currency: {type: string, pattern: '^[A-Z]{3}$'}
        amountMinor: {type: integer}
    CurrentIdentity:
      type: object
      required: [authUserId, sessionId, assuranceLevel, memberships]
      properties:
        authUserId: {$ref: '#/components/schemas/Identifier'}
        sessionId: {$ref: '#/components/schemas/Identifier'}
        partyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        assuranceLevel: {type: string, enum: [aal1, aal2, phishing-resistant]}
        activeContext: {oneOf: [{$ref: '#/components/schemas/ActiveContext'}, {type: 'null'}]}
        memberships:
          type: array
          items: {$ref: '#/components/schemas/MembershipSummary'}
    ActiveContextRequest:
      type: object
      required: [organizationId]
      properties:
        organizationId: {$ref: '#/components/schemas/Identifier'}
        legalEntityId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        branchId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        locationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    ActiveContext:
      type: object
      required: [contextId, tenantId, organizationId, authUserId, issuedAt, expiresAt]
      properties:
        contextId: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        organizationId: {$ref: '#/components/schemas/Identifier'}
        legalEntityId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        branchId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        locationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        authUserId: {$ref: '#/components/schemas/Identifier'}
        partyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        delegationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        issuedAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
    MembershipSummary:
      type: object
      required: [membershipId, tenantId, organizationId, state, version]
      properties:
        membershipId: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        organizationId: {$ref: '#/components/schemas/Identifier'}
        state: {type: string, enum: [Invited, Provisioning, Active, Suspended, Ended]}
        roleAssignmentIds:
          type: array
          items: {$ref: '#/components/schemas/Identifier'}
        version: {type: integer, minimum: 1}
    Organization:
      type: object
      required: [id, tenantId, name, state, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        name: {type: string, maxLength: 200}
        state: {type: string, enum: [Provisioning, Active, Suspended, Archived]}
        timezone: {type: string, maxLength: 100}
        locale: {type: string, maxLength: 35}
        version: {type: integer, minimum: 1}
    UpdateOrganizationRequest:
      type: object
      required: [version]
      minProperties: 2
      properties:
        name: {type: string, minLength: 1, maxLength: 200}
        timezone: {type: string, maxLength: 100}
        locale: {type: string, maxLength: 35}
        version: {type: integer, minimum: 1}
    Location:
      type: object
      required: [id, tenantId, organizationId, name, type, timezone, state, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        organizationId: {$ref: '#/components/schemas/Identifier'}
        name: {type: string, minLength: 1, maxLength: 200}
        type: {type: string, enum: [Store, Warehouse, Office, Mobile, Virtual, Other]}
        timezone: {type: string, maxLength: 100}
        state: {type: string, enum: [Active, Suspended, Archived]}
        version: {type: integer, minimum: 1}
    PagedLocations:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Location'}}
        nextCursor: {type: [string, 'null']}
    SessionSummary:
      type: object
      required: [id, createdAt, updatedAt, expiresAt, current]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
        current: {type: boolean}
        ipAddressMasked: {type: [string, 'null'], maxLength: 64}
        userAgentSummary: {type: [string, 'null'], maxLength: 200}
        deviceLabel: {type: [string, 'null'], maxLength: 100}
    PagedSessions:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/SessionSummary'}}
        nextCursor: {type: [string, 'null']}
    UserSummary:
      type: object
      required: [authUserId, email, authenticationState, memberships]
      properties:
        authUserId: {$ref: '#/components/schemas/Identifier'}
        partyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        email: {type: string, format: email}
        displayName: {type: string, maxLength: 200}
        authenticationState: {type: string, enum: [Active, Suspended]}
        memberships: {type: array, items: {$ref: '#/components/schemas/MembershipSummary'}}
    PagedUsers:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/UserSummary'}}
        nextCursor: {type: [string, 'null']}
    CreateUserInvitationRequest:
      type: object
      required: [email, organizationId, roleIds]
      properties:
        email: {type: string, format: email}
        organizationId: {$ref: '#/components/schemas/Identifier'}
        roleIds:
          type: array
          minItems: 1
          uniqueItems: true
          items: {$ref: '#/components/schemas/Identifier'}
        partyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        expiresAt: {type: [string, 'null'], format: date-time}
    UserInvitation:
      type: object
      required: [id, tenantId, organizationId, email, state, createdAt, expiresAt]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        organizationId: {$ref: '#/components/schemas/Identifier'}
        email: {type: string, format: email}
        state: {type: string, enum: [Pending, Provisioning, Delivered, Accepted, Failed, Cancelled, Expired]}
        createdAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
        failureCode: {type: [string, 'null'], maxLength: 100}
    SuspendTenantMembershipRequest:
      type: object
      required: [membershipId, reason, version]
      properties:
        membershipId: {$ref: '#/components/schemas/Identifier'}
        reason: {type: string, minLength: 1, maxLength: 500}
        version: {type: integer, minimum: 1}
        revokeSessionsWhenNoActiveMembershipsRemain: {type: boolean, default: true}
    Role:
      type: object
      required: [id, tenantId, name, permissionIds, state, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        name: {type: string, minLength: 1, maxLength: 120}
        description: {type: [string, 'null'], maxLength: 500}
        permissionIds: {type: array, uniqueItems: true, items: {type: string}}
        state: {type: string, enum: [Active, Inactive]}
        version: {type: integer, minimum: 1}
    PagedRoles:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Role'}}
        nextCursor: {type: [string, 'null']}
    CreateRoleAssignmentRequest:
      type: object
      required: [membershipId, roleId, scopeType, startsAt]
      properties:
        membershipId: {$ref: '#/components/schemas/Identifier'}
        roleId: {$ref: '#/components/schemas/Identifier'}
        scopeType: {type: string, enum: [Tenant, Organization, LegalEntity, Branch, Location]}
        scopeId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        startsAt: {type: string, format: date-time}
        endsAt: {type: [string, 'null'], format: date-time}
    RoleAssignment:
      allOf:
        - $ref: '#/components/schemas/CreateRoleAssignmentRequest'
        - type: object
          required: [id, tenantId, state, version]
          properties:
            id: {$ref: '#/components/schemas/Identifier'}
            tenantId: {$ref: '#/components/schemas/Identifier'}
            state: {type: string, enum: [Active, Revoked, Expired]}
            version: {type: integer, minimum: 1}
    Entitlement:
      type: object
      required: [id, tenantId, capabilityId, state, source, startsAt, dependencies, exclusions, limits, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        capabilityId: {type: string, pattern: '^[a-z][a-z0-9-]*\.[a-z][a-z0-9-]*$'}
        organizationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        state: {type: string, enum: [Pending, Trial, Active, Grace, Suspended, Expired, Revoked, Archived]}
        source: {type: string, enum: [PlatformSubscription, ManualGrant, Trial, Migration, AddOn, Contract, PartnerPolicy]}
        startsAt: {type: string, format: date-time}
        endsAt: {type: [string, 'null'], format: date-time}
        dependencies: {type: array, items: {type: string, pattern: '^[a-z][a-z0-9-]*\.[a-z][a-z0-9-]*$'}}
        exclusions: {type: array, items: {type: string, pattern: '^[a-z][a-z0-9-]*\.[a-z][a-z0-9-]*$'}}
        limits: {type: object, additionalProperties: {type: integer, minimum: 0}}
        version: {type: integer, minimum: 1}
    PagedEntitlements:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Entitlement'}}
        nextCursor: {type: [string, 'null']}
    Party:
      type: object
      required: [id, tenantId, type, displayName, state, classification, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        type: {type: string, enum: [Person, Organization]}
        displayName: {type: string, maxLength: 300}
        state: {type: string, enum: [Active, Inactive, Merged, Restricted]}
        classification: {type: string, enum: [Internal, Confidential, Restricted]}
        version: {type: integer, minimum: 1}
    CreatePersonParty:
      type: object
      required: [displayName]
      properties:
        displayName: {type: string, minLength: 1, maxLength: 300}
        email: {type: string, format: email}
        phone: {type: string, maxLength: 50}
    CreateOrganizationParty:
      type: object
      required: [displayName]
      properties:
        displayName: {type: string, minLength: 1, maxLength: 300}
        registeredName: {type: [string, 'null'], maxLength: 300}
        email: {type: [string, 'null'], format: email}
        phone: {type: [string, 'null'], maxLength: 50}
    UpdatePartyRequest:
      type: object
      required: [version]
      minProperties: 2
      properties:
        displayName: {type: string, minLength: 1, maxLength: 300}
        state: {type: string, enum: [Active, Inactive, Restricted]}
        version: {type: integer, minimum: 1}
    CreatePartyIdentityLinkRequest:
      type: object
      required: [authUserId, membershipId, partyId]
      properties:
        authUserId: {$ref: '#/components/schemas/Identifier'}
        membershipId: {$ref: '#/components/schemas/Identifier'}
        partyId: {$ref: '#/components/schemas/Identifier'}
    PlatformIdentityLink:
      type: object
      required: [id, tenantId, authUserId, membershipId, partyId, state, createdAt, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        authUserId: {$ref: '#/components/schemas/Identifier'}
        membershipId: {$ref: '#/components/schemas/Identifier'}
        partyId: {$ref: '#/components/schemas/Identifier'}
        state: {type: string, enum: [Active, Suspended, Ended]}
        createdAt: {type: string, format: date-time}
        version: {type: integer, minimum: 1}
    PagedParties:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Party'}}
        nextCursor: {type: [string, 'null']}
    ProductIdentifierType:
      type: string
      enum: [SKU, GTIN, UPC, EAN, Alias, External]
    ProductIdentifierScheme:
      type: string
      enum: [Tenant, GTIN-8, GTIN-12, GTIN-13, GTIN-14]
    ProductIdentifierInput:
      type: object
      additionalProperties: false
      required: [type, scheme, value]
      properties:
        type: {$ref: '#/components/schemas/ProductIdentifierType'}
        scheme: {$ref: '#/components/schemas/ProductIdentifierScheme'}
        value: {type: string, minLength: 1, maxLength: 128}
    ProductIdentifier:
      allOf:
        - {$ref: '#/components/schemas/ProductIdentifierInput'}
        - type: object
          required: [id]
          properties:
            id: {$ref: '#/components/schemas/Identifier'}
    CreateProductVariant:
      type: object
      additionalProperties: false
      required: [name, identifiers]
      properties:
        name: {type: string, minLength: 1, maxLength: 300}
        identifiers:
          type: array
          maxItems: 20
          items: {$ref: '#/components/schemas/ProductIdentifierInput'}
    UpdateProductIdentifier:
      allOf:
        - {$ref: '#/components/schemas/ProductIdentifierInput'}
        - type: object
          properties:
            id: {$ref: '#/components/schemas/Identifier'}
    UpdateProductVariant:
      type: object
      additionalProperties: false
      required: [name, identifiers]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        name: {type: string, minLength: 1, maxLength: 300}
        identifiers:
          type: array
          maxItems: 20
          items: {$ref: '#/components/schemas/UpdateProductIdentifier'}
    ProductVariant:
      type: object
      additionalProperties: false
      required: [id, name, identifiers]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        name: {type: string, minLength: 1, maxLength: 300}
        identifiers:
          type: array
          maxItems: 20
          items: {$ref: '#/components/schemas/ProductIdentifier'}
    Product:
      type: object
      required: [id, name, state, variants, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        name: {type: string, minLength: 1, maxLength: 300}
        state: {type: string, enum: [Draft, Active, Suspended, Discontinued, Archived]}
        variants:
          type: array
          minItems: 1
          maxItems: 50
          items: {$ref: '#/components/schemas/ProductVariant'}
        version: {type: integer, minimum: 1}
    CreateProduct:
      type: object
      additionalProperties: false
      required: [name, variants]
      properties:
        name: {type: string, minLength: 1, maxLength: 300}
        variants:
          type: array
          minItems: 1
          maxItems: 50
          items: {$ref: '#/components/schemas/CreateProductVariant'}
    UpdateProduct:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: {type: string, minLength: 1, maxLength: 300}
        variants:
          type: array
          minItems: 1
          maxItems: 50
          items: {$ref: '#/components/schemas/UpdateProductVariant'}
    PagedProducts:
      type: object
      required: [items]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Product'}}
        nextCursor: {type: [string, 'null']}
    StockBalance:
      type: object
      required: [productId, locationId, unit, onHand, available, asOf]
      properties:
        productId: {$ref: '#/components/schemas/Identifier'}
        locationId: {$ref: '#/components/schemas/Identifier'}
        unit: {type: string}
        onHand: {$ref: '#/components/schemas/DecimalQuantity'}
        available: {$ref: '#/components/schemas/DecimalQuantity'}
        asOf: {type: string, format: date-time}
        reconciled: {type: boolean}
    DecimalQuantity:
      type: string
      pattern: '^-?(?:0|[1-9][0-9]*)(?:\.[0-9]{1,6})?$'
      description: Exact decimal quantity with at most six fractional digits; exponent notation is prohibited.
    PositiveDecimalQuantity:
      type: string
      pattern: '^(?!0(?:\.0{1,6})?$)(?:0|[1-9][0-9]*)(?:\.[0-9]{1,6})?$'
      description: Exact decimal quantity greater than zero with at most six fractional digits; exponent and sign notation are prohibited.
    NonNegativeDecimalQuantity:
      type: string
      pattern: '^(?:0|[1-9][0-9]*)(?:\.[0-9]{1,6})?$'
      description: Exact decimal quantity greater than or equal to zero with at most six fractional digits; exponent and sign notation are prohibited.
    TransitionReason:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: {type: string, minLength: 1, maxLength: 500}
    ImportJob:
      type: object
      additionalProperties: false
      required: [id, state, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        state:
          type: string
          enum: [Uploaded, Validating, ReadyForApproval, Approved, Committing, Completed, Failed, Cancelled]
        version: {type: integer, minimum: 1}
    CreateInventoryAdjustment:
      type: object
      additionalProperties: false
      required: [locationId, productId, quantity, unit, reason]
      properties:
        locationId: {$ref: '#/components/schemas/Identifier'}
        productId: {$ref: '#/components/schemas/Identifier'}
        variantId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        quantity: {$ref: '#/components/schemas/DecimalQuantity'}
        unit: {type: string}
        reason: {type: string, maxLength: 500}
        conversionSourceId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    InventoryAdjustment:
      allOf:
        - $ref: '#/components/schemas/CreateInventoryAdjustment'
        - type: object
          required: [id, state, version]
          properties:
            id: {$ref: '#/components/schemas/Identifier'}
            state: {type: string, enum: [Draft, PendingApproval, Approved, Posted, Reversed, Rejected]}
            version: {type: integer, minimum: 1}
            movementId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
            reversalMovementId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    PagedInventoryAdjustments:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/InventoryAdjustment'}}
        nextCursor: {type: [string, 'null']}
    CreateStockCount:
      type: object
      additionalProperties: false
      required: [locationId]
      properties:
        locationId: {$ref: '#/components/schemas/Identifier'}
        blind: {type: boolean, default: true}
    SubmitStockCountLine:
      type: object
      additionalProperties: false
      required: [productId, unit, observedQuantity]
      properties:
        productId: {$ref: '#/components/schemas/Identifier'}
        variantId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        unit: {type: string, minLength: 1, maxLength: 50}
        observedQuantity: {$ref: '#/components/schemas/NonNegativeDecimalQuantity'}
        conversionSourceId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    SubmitStockCount:
      type: object
      additionalProperties: false
      required: [lines]
      properties:
        lines: {type: array, minItems: 1, items: {$ref: '#/components/schemas/SubmitStockCountLine'}}
    StockCountLine:
      type: object
      additionalProperties: false
      required: [id, productId, unit, observedQuantity]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        productId: {$ref: '#/components/schemas/Identifier'}
        variantId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        unit: {type: string, minLength: 1, maxLength: 50}
        observedQuantity: {$ref: '#/components/schemas/NonNegativeDecimalQuantity'}
        expectedQuantity: {oneOf: [{$ref: '#/components/schemas/DecimalQuantity'}, {type: 'null'}]}
        varianceQuantity: {oneOf: [{$ref: '#/components/schemas/DecimalQuantity'}, {type: 'null'}]}
        conversionSourceId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        movementId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    StockCount:
      type: object
      additionalProperties: false
      required: [id, locationId, blind, lines, state, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        locationId: {$ref: '#/components/schemas/Identifier'}
        blind: {type: boolean}
        lines: {type: array, items: {$ref: '#/components/schemas/StockCountLine'}}
        state: {type: string, enum: [Draft, InProgress, Submitted, Approved, Posted, Rejected]}
        version: {type: integer, minimum: 1}
    PagedStockCounts:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/StockCount'}}
        nextCursor: {type: [string, 'null']}
    CreateStockTransfer:
      type: object
      additionalProperties: false
      required: [sourceLocationId, destinationLocationId, lines]
      properties:
        sourceLocationId: {$ref: '#/components/schemas/Identifier'}
        destinationLocationId: {$ref: '#/components/schemas/Identifier'}
        lines: {type: array, minItems: 1, items: {$ref: '#/components/schemas/QuantityLine'}}
    StockTransferLine:
      type: object
      additionalProperties: false
      required: [id, productId, unit, requestedQuantity, dispatchedQuantity, receivedQuantity, remainingQuantity]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        productId: {$ref: '#/components/schemas/Identifier'}
        variantId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        unit: {type: string, minLength: 1, maxLength: 50}
        conversionSourceId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        requestedQuantity: {$ref: '#/components/schemas/PositiveDecimalQuantity'}
        dispatchedQuantity: {$ref: '#/components/schemas/NonNegativeDecimalQuantity'}
        receivedQuantity: {$ref: '#/components/schemas/NonNegativeDecimalQuantity'}
        remainingQuantity: {$ref: '#/components/schemas/NonNegativeDecimalQuantity'}
        exceptionQuantity: {$ref: '#/components/schemas/NonNegativeDecimalQuantity'}
    ReceiveStockTransferLine:
      type: object
      additionalProperties: false
      required: [lineId, receivedQuantity]
      properties:
        lineId: {$ref: '#/components/schemas/Identifier'}
        receivedQuantity: {$ref: '#/components/schemas/PositiveDecimalQuantity'}
    ReceiveStockTransfer:
      type: object
      additionalProperties: false
      required: [lines, outcome]
      properties:
        lines: {type: array, minItems: 1, items: {$ref: '#/components/schemas/ReceiveStockTransferLine'}}
        outcome: {type: string, enum: [Accepted, Exception]}
        exceptionReason: {type: [string, 'null'], minLength: 1, maxLength: 500}
    StockTransfer:
      type: object
      additionalProperties: false
      required: [id, sourceLocationId, destinationLocationId, lines, state, version]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        sourceLocationId: {$ref: '#/components/schemas/Identifier'}
        destinationLocationId: {$ref: '#/components/schemas/Identifier'}
        lines: {type: array, minItems: 1, items: {$ref: '#/components/schemas/StockTransferLine'}}
        state: {type: string, enum: [Draft, Dispatched, PartiallyReceived, Received, Exception, Cancelled]}
        version: {type: integer, minimum: 1}
        exceptionReason: {type: [string, 'null'], maxLength: 500}
    PagedStockTransfers:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/StockTransfer'}}
        nextCursor: {type: [string, 'null']}
    QuantityLine:
      type: object
      additionalProperties: false
      required: [productId, quantity, unit]
      properties:
        productId: {$ref: '#/components/schemas/Identifier'}
        variantId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        quantity: {$ref: '#/components/schemas/PositiveDecimalQuantity'}
        unit: {type: string}
        conversionSourceId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    OpenRegisterRequest:
      type: object
      required: [currency, openingFloat]
      properties:
        currency: {type: string, pattern: '^[A-Z]{3}$'}
        openingFloat: {$ref: '#/components/schemas/Money'}
    CloseRegisterRequest:
      type: object
      required: [countedCash]
      properties:
        countedCash: {$ref: '#/components/schemas/Money'}
        reason: {type: string, maxLength: 500}
    CreateSale:
      type: object
      required: [registerId, currency, lines]
      properties:
        registerId: {$ref: '#/components/schemas/Identifier'}
        customerPartyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        currency: {type: string, pattern: '^[A-Z]{3}$'}
        lines: {type: array, minItems: 1, items: {$ref: '#/components/schemas/SaleLineInput'}}
    SaleLineInput:
      type: object
      required: [productId, quantity]
      properties:
        productId: {$ref: '#/components/schemas/Identifier'}
        quantity: {type: number, exclusiveMinimum: 0}
    CompleteSaleRequest:
      type: object
      required: [tenders]
      properties:
        tenders: {type: array, minItems: 1, items: {$ref: '#/components/schemas/TenderReference'}}
    TenderReference:
      type: object
      required: [type, amount]
      properties:
        type: {type: string, enum: [Cash, PaymentIntent, StoredValue]}
        amount: {$ref: '#/components/schemas/Money'}
        referenceId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    Sale:
      type: object
      required: [id, state, currency, total]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        state: {type: string}
        currency: {type: string}
        total: {$ref: '#/components/schemas/Money'}
        receiptId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    CreateReturn:
      type: object
      required: [saleId, lines, reason]
      properties:
        saleId: {$ref: '#/components/schemas/Identifier'}
        lines: {type: array, minItems: 1, items: {$ref: '#/components/schemas/QuantityLine'}}
        reason: {type: string, maxLength: 500}
    CreateDeposit:
      type: object
      required: [currency, sourceShiftIds, countedAmount]
      properties:
        currency: {type: string, pattern: '^[A-Z]{3}$'}
        sourceShiftIds: {type: array, minItems: 1, items: {$ref: '#/components/schemas/Identifier'}}
        countedAmount: {$ref: '#/components/schemas/Money'}
    CreatePaymentIntent:
      type: object
      required: [saleId, rail, amount]
      properties:
        saleId: {$ref: '#/components/schemas/Identifier'}
        rail: {type: string, enum: [Card, Bank, Wallet, RequestToPay]}
        amount: {$ref: '#/components/schemas/Money'}
        providerAdapterId: {$ref: '#/components/schemas/Identifier'}
    PaymentIntent:
      type: object
      required: [id, state, amount]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        state: {type: string, enum: [Created, CustomerActionRequired, Processing, Authorized, Captured, Failed, Cancelled, Uncertain, ReconciliationRequired, Refunded, PartiallyRefunded, Reversed]}
        amount: {$ref: '#/components/schemas/Money'}
        providerReference: {type: [string, 'null']}
    IssueStoredValueInstrument:
      type: object
      required: [programId, currency]
      properties:
        programId: {$ref: '#/components/schemas/Identifier'}
        currency: {type: string, pattern: '^[A-Z]{3}$'}
        partyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    ReserveStoredValue:
      type: object
      required: [amount, sourceSaleId]
      properties:
        amount: {$ref: '#/components/schemas/Money'}
        sourceSaleId: {$ref: '#/components/schemas/Identifier'}
    EnrollDevice:
      type: object
      required: [deviceType, publicKey, locationId]
      properties:
        deviceType: {type: string}
        publicKey: {type: string}
        locationId: {$ref: '#/components/schemas/Identifier'}
    AccountantHandoffRequest:
      type: object
      required: [legalEntityId, periodStart, periodEnd, currency]
      properties:
        legalEntityId: {$ref: '#/components/schemas/Identifier'}
        periodStart: {type: string, format: date-time}
        periodEnd: {type: string, format: date-time}
        currency: {type: string, pattern: '^[A-Z]{3}$'}
    CreateWebhookSubscription:
      type: object
      required: [endpoint, eventNames]
      properties:
        endpoint: {type: string, format: uri, pattern: '^https://'}
        eventNames: {type: array, minItems: 1, items: {type: string}}
    CreatePrivacyRequest:
      type: object
      required: [requestType, subjectReference, intakeChannel]
      properties:
        requestType: {type: string, enum: [Access, Export, Correct, Restrict, Erase, Object]}
        subjectReference: {type: string}
        intakeChannel: {type: string, enum: [SelfService, StaffAssisted, AuthorizedAgent]}
    AuthenticatedPrincipal:
      type: object
      required: [authUserId, sessionId, assuranceLevel]
      properties:
        authUserId: {$ref: '#/components/schemas/Identifier'}
        sessionId: {$ref: '#/components/schemas/Identifier'}
        partyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        assuranceLevel: {type: string, enum: [aal1, aal2, phishing-resistant]}
        activeContext: {oneOf: [{$ref: '#/components/schemas/ActiveContext'}, {type: 'null'}]}
    AuthorizationDecision:
      oneOf:
        - type: object
          required: [outcome, permission, matchedAssignments]
          properties:
            outcome: {const: allow}
            permission: {type: string}
            matchedAssignments: {type: array, items: {$ref: '#/components/schemas/Identifier'}}
        - type: object
          required: [outcome, reason]
          properties:
            outcome: {const: deny}
            reason: {type: string, enum: [not_authenticated, wrong_tenant, no_assignment, scope_mismatch, assignment_inactive, policy_denied]}
        - type: object
          required: [outcome, policyId]
          properties:
            outcome: {const: require_approval}
            policyId: {type: string}
        - type: object
          required: [outcome, assuranceLevel]
          properties:
            outcome: {const: require_step_up}
            assuranceLevel: {type: string}
        - type: object
          required: [outcome, permission, fieldPolicyId]
          properties:
            outcome: {const: allow_masked}
            permission: {type: string}
            fieldPolicyId: {type: string}
        - type: object
          required: [outcome, permission, limitPolicyId]
          properties:
            outcome: {const: allow_with_limit}
            permission: {type: string}
            limitPolicyId: {type: string}
        - type: object
          required: [outcome, permission, policyId]
          properties:
            outcome: {const: allow_read_only}
            permission: {type: string}
            policyId: {type: string}
    AuditRecord:
      type: object
      required: [id, scopeType, actorType, action, targetType, sourceChannel, outcome, correlationId, classification, retentionClass, occurredAt, metadata]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        scopeType: {type: string, enum: [Tenant, Platform]}
        tenantId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        organizationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        locationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        actorType: {type: string, enum: [human, service, device, integration, automation, ai, support]}
        actorPartyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        actorUserId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        originalActorId: {type: [string, 'null']}
        action: {type: string, maxLength: 200}
        targetType: {type: string, maxLength: 200}
        targetId: {type: [string, 'null'], maxLength: 200}
        sourceChannel: {type: string, maxLength: 100}
        outcome: {type: string, enum: [success, denied, failure]}
        reasonCode: {type: [string, 'null'], maxLength: 100}
        correlationId: {type: string, minLength: 12, maxLength: 128}
        causationId: {type: [string, 'null'], maxLength: 128}
        approvalId: {type: [string, 'null'], maxLength: 128}
        delegationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        changeSummary: {type: [object, 'null'], additionalProperties: true}
        classification: {type: string, enum: [Internal, Confidential, Restricted]}
        retentionClass: {type: string, maxLength: 100}
        privacyCaseId: {type: [string, 'null'], maxLength: 128}
        privacyTransformationVersion: {type: [string, 'null'], maxLength: 50}
        occurredAt: {type: string, format: date-time}
        metadata: {type: object, additionalProperties: true}
      oneOf:
        - required: [scopeType, tenantId]
          properties:
            scopeType: {const: Tenant}
            tenantId: {$ref: '#/components/schemas/Identifier'}
        - required: [scopeType]
          properties:
            scopeType: {const: Platform}
            tenantId: {type: 'null'}
            organizationId: {type: 'null'}
            locationId: {type: 'null'}
    PagedAuditRecords:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/AuditRecord'}}
        nextCursor: {type: [string, 'null']}
    Problem:
      type: object
      required: [type, title, status, code, safeMessageKey, correlationId, retryable, uncertainty]
      properties:
        type: {type: string, format: uri-reference}
        title: {type: string}
        status: {type: integer}
        code: {type: string, enum: [validation, authentication, authorization, entitlement, conflict, state_transition, rate_limit, provider_uncertainty, dependency_unavailable, internal_failure]}
        safeMessageKey: {type: string, pattern: '^[a-z][a-z0-9_.-]+$'}
        detail: {type: [string, 'null'], maxLength: 1000}
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, code, messageKey]
            properties:
              field: {type: string, maxLength: 200}
              code: {type: string, maxLength: 100}
              messageKey: {type: string, pattern: '^[a-z][a-z0-9_.-]+$'}
        correlationId: {type: string, minLength: 12, maxLength: 128}
        retryable: {type: boolean}
        uncertainty: {type: boolean}
        nextAction: {type: [string, 'null'], enum: [retry, reauthenticate, step_up, request_approval, contact_support, null]}
