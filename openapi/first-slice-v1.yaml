        state: {type: string, enum: [Prepared, Reconciled], description: 'Prepared is effect-free (reserves safe custody, posts no custody transfer); Reconciled posts the safe-to-bank custody transfer atomically (commerce.deposit.confirm, frozen control plan §6.6).'}
        preparerPartyId: {$ref: '#/components/schemas/Identifier'}
        preparedAt: {type: string, format: date-time}
        confirmerPartyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        confirmedAt: {oneOf: [{type: string, format: date-time}, {type: 'null'}]}
        version: {type: integer, minimum: 1}
    PagedDeposits:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Deposit'}}
        nextCursor: {type: [string, 'null']}
    CreatePaymentIntent:
      type: object
      required: [saleId, rail, amount]
      properties:
        saleId: {$ref: '#/components/schemas/Identifier'}
        rail: {type: string, enum: [Card, Bank, Wallet, RequestToPay]}
        amount: {$ref: '#/components/schemas/Money'}
        providerAdapterId: {$ref: '#/components/schemas/Identifier'}
    PaymentIntent:
      type: object
      required: [id, state, amount]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        state: {type: string, enum: [Created, CustomerActionRequired, Processing, Authorized, Captured, Failed, Cancelled, Uncertain, ReconciliationRequired, Refunded, PartiallyRefunded, Reversed]}
        amount: {$ref: '#/components/schemas/Money'}
        providerReference: {type: [string, 'null']}
    IssueStoredValueInstrument:
      type: object
      required: [programId, currency]
      properties:
        programId: {$ref: '#/components/schemas/Identifier'}
        currency: {type: string, pattern: '^[A-Z]{3}$'}
        partyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
    ReserveStoredValue:
      type: object
      required: [amount, sourceSaleId]
      properties:
        amount: {$ref: '#/components/schemas/Money'}
        sourceSaleId: {$ref: '#/components/schemas/Identifier'}
    EnrollDevice:
      type: object
      required: [deviceType, publicKey, locationId]
      properties:
        deviceType: {type: string}
        publicKey: {type: string}
        locationId: {$ref: '#/components/schemas/Identifier'}
    AccountantHandoffRequest:
      type: object
      required: [legalEntityId, periodStart, periodEnd, currency, timezone]
      properties:
        legalEntityId: {$ref: '#/components/schemas/Identifier'}
        periodStart: {type: string, format: date-time, description: 'Exact UTC instant lower bound (inclusive) of the export range. The caller derives this from the desired local calendar boundary using timezone; the server performs plain instant-range comparisons, never a local-date truncation.'}
        periodEnd: {type: string, format: date-time, description: 'Exact UTC instant upper bound (exclusive) of the export range.'}
        currency: {type: string, pattern: '^[A-Z]{3}$'}
        timezone: {type: string, description: 'IANA timezone the caller used to derive periodStart/periodEnd from local calendar dates (e.g. America/Guyana). Carried through to finance-handoff-v1''s period.timezone for legally relevant local-date interpretation (CLAUDE.md §7) — never used to re-derive the UTC bounds server-side.'}
    AccountantHandoffExport:
      type: object
      required: [id, idempotencyKey, kind, tenantId, legalEntityId, organizationId, currency, timezone, ruleVersion, schemaVersion, contentHash, generatedAt, periodStart, periodEnd, payload]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        idempotencyKey: {type: string}
        kind: {type: string, enum: [AccountantHandoff]}
        tenantId: {$ref: '#/components/schemas/Identifier'}
        legalEntityId: {$ref: '#/components/schemas/Identifier'}
        organizationId: {$ref: '#/components/schemas/Identifier'}
        currency: {type: string, pattern: '^[A-Z]{3}$'}
        timezone: {type: string}
        ruleVersion: {type: string}
        schemaVersion: {type: string}
        contentHash: {type: string, description: 'sha256 of the canonical (recursively key-sorted) JSON serialization of payload — deterministic and reproducible for identical inputs (frozen control plan Tests: "export determinism"), excludes generatedAt/id.'}
        generatedAt: {type: string, format: date-time, description: 'Wall-clock generation time of THIS job record; excluded from contentHash so two independent generations over identical inputs still hash identically.'}
        periodStart: {type: string, format: date-time}
        periodEnd: {type: string, format: date-time}
        payload: {type: object, description: 'The full accountant export package (PDA-DOM-026): payload.postingBatch validates against schemas/finance/finance-handoff-v1.schema.json exactly; sibling fields (manifest-adjacent summaries, reconciliation, exceptions) are documented in FIRST_SLICE_FINANCE_HANDOFF_CONTRACT.md''s "Accountant Export Package" section. Left as a free-form object here rather than fully inlining finance-handoff-v1''s schema a second time — the JSON Schema file remains the single source of truth for postingBatch''s shape.'}
    CreateWebhookSubscription:
      type: object
      required: [endpoint, eventNames]
      properties:
        endpoint: {type: string, format: uri, pattern: '^https://'}
        eventNames: {type: array, minItems: 1, items: {type: string}}
    CreatePrivacyRequest:
      type: object
      required: [requestType, subjectReference, intakeChannel]
      properties:
        requestType: {type: string, enum: [Access, Export, Correct, Restrict, Erase, Object]}
        subjectReference: {type: string}
        intakeChannel: {type: string, enum: [SelfService, StaffAssisted, AuthorizedAgent]}
    AuthenticatedPrincipal:
      type: object
      required: [authUserId, sessionId, assuranceLevel]
      properties:
        authUserId: {$ref: '#/components/schemas/Identifier'}
        sessionId: {$ref: '#/components/schemas/Identifier'}
        partyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        assuranceLevel: {type: string, enum: [aal1, aal2, phishing-resistant]}
        activeContext: {oneOf: [{$ref: '#/components/schemas/ActiveContext'}, {type: 'null'}]}
    AuthorizationDecision:
      oneOf:
        - type: object
          required: [outcome, permission, matchedAssignments]
          properties:
            outcome: {const: allow}
            permission: {type: string}
            matchedAssignments: {type: array, items: {$ref: '#/components/schemas/Identifier'}}
        - type: object
          required: [outcome, reason]
          properties:
            outcome: {const: deny}
            reason: {type: string, enum: [not_authenticated, wrong_tenant, no_assignment, scope_mismatch, assignment_inactive, policy_denied]}
        - type: object
          required: [outcome, policyId]
          properties:
            outcome: {const: require_approval}
            policyId: {type: string}
        - type: object
          required: [outcome, assuranceLevel]
          properties:
            outcome: {const: require_step_up}
            assuranceLevel: {type: string}
        - type: object
          required: [outcome, permission, fieldPolicyId]
          properties:
            outcome: {const: allow_masked}
            permission: {type: string}
            fieldPolicyId: {type: string}
        - type: object
          required: [outcome, permission, limitPolicyId]
          properties:
            outcome: {const: allow_with_limit}
            permission: {type: string}
            limitPolicyId: {type: string}
        - type: object
          required: [outcome, permission, policyId]
          properties:
            outcome: {const: allow_read_only}
            permission: {type: string}
            policyId: {type: string}
    AuditRecord:
      type: object
      required: [id, scopeType, actorType, action, targetType, sourceChannel, outcome, correlationId, classification, retentionClass, occurredAt, metadata]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        scopeType: {type: string, enum: [Tenant, Platform]}
        tenantId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        organizationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        locationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        actorType: {type: string, enum: [human, service, device, integration, automation, ai, support]}
        actorPartyId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        actorUserId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        originalActorId: {type: [string, 'null']}
        action: {type: string, maxLength: 200}
        targetType: {type: string, maxLength: 200}
        targetId: {type: [string, 'null'], maxLength: 200}
        sourceChannel: {type: string, maxLength: 100}
        outcome: {type: string, enum: [success, denied, failure]}
        reasonCode: {type: [string, 'null'], maxLength: 100}
        correlationId: {type: string, minLength: 12, maxLength: 128}
        causationId: {type: [string, 'null'], maxLength: 128}
        approvalId: {type: [string, 'null'], maxLength: 128}
        delegationId: {oneOf: [{$ref: '#/components/schemas/Identifier'}, {type: 'null'}]}
        changeSummary: {type: [object, 'null'], additionalProperties: true}
        classification: {type: string, enum: [Internal, Confidential, Restricted]}
        retentionClass: {type: string, maxLength: 100}
        privacyCaseId: {type: [string, 'null'], maxLength: 128}
        privacyTransformationVersion: {type: [string, 'null'], maxLength: 50}
        occurredAt: {type: string, format: date-time}
        metadata: {type: object, additionalProperties: true}
      oneOf:
        - required: [scopeType, tenantId]
          properties:
            scopeType: {const: Tenant}
            tenantId: {$ref: '#/components/schemas/Identifier'}
        - required: [scopeType]
          properties:
            scopeType: {const: Platform}
            tenantId: {type: 'null'}
            organizationId: {type: 'null'}
            locationId: {type: 'null'}
    PagedAuditRecords:
      type: object
      required: [items, nextCursor]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/AuditRecord'}}
        nextCursor: {type: [string, 'null']}
    Problem:
      type: object
      required: [type, title, status, code, safeMessageKey, correlationId, retryable, uncertainty]
      properties:
        type: {type: string, format: uri-reference}
        title: {type: string}
        status: {type: integer}
        code: {type: string, enum: [validation, authentication, authorization, entitlement, conflict, state_transition, rate_limit, provider_uncertainty, dependency_unavailable, internal_failure]}
        safeMessageKey: {type: string, pattern: '^[a-z][a-z0-9_.-]+$'}
        detail: {type: [string, 'null'], maxLength: 1000}
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, code, messageKey]
            properties:
              field: {type: string, maxLength: 200}
              code: {type: string, maxLength: 100}
              messageKey: {type: string, pattern: '^[a-z][a-z0-9_.-]+$'}
        correlationId: {type: string, minLength: 12, maxLength: 128}
        retryable: {type: boolean}
        uncertainty: {type: boolean}
        nextAction: {type: [string, 'null'], enum: [retry, reauthenticate, step_up, request_approval, contact_support, null]}
